name: Metrics
on:
  # Schedule twice-daily updates
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 12 * * *"
  # (Optional) Run workflow manually
  workflow_dispatch:
  # (Optional) Run workflow when pushing on master/main
  push: { branches: ["master", "main"] }

concurrency:
  group: profile-artifacts
  cancel-in-progress: false

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: Kuldeep2822k
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_display: large

          # Notable contributions (The "Contributed to" section)
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_types: commit

          plugin_activity: no
          plugin_habits: no
          plugin_achievements: no

      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: Kuldeep2822k
          template: classic
          filename: github-metrics-stats.svg
          base: header, repositories, metadata
          config_timezone: Asia/Kolkata
          config_display: large

          plugin_notable: no
          plugin_activity: no
          plugin_habits: no
          plugin_achievements: no

      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: Kuldeep2822k
          template: classic
          filename: github-metrics-languages.svg
          base: header
          config_timezone: Asia/Kolkata
          config_display: large

          plugin_languages: yes
          plugin_notable: no
          plugin_activity: no
          plugin_habits: no
          plugin_achievements: no

      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: Kuldeep2822k
          template: classic
          filename: github-metrics-activity.svg
          base: activity, community
          config_timezone: Asia/Kolkata
          config_display: large

          plugin_notable: no
          plugin_activity: no
          plugin_habits: no
          plugin_achievements: no
