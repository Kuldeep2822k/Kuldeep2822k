name: Trophies

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    branches: ["master", "main"]
    paths-ignore:
      - github-trophies.svg

concurrency:
  group: profile-artifacts
  cancel-in-progress: false

jobs:
  update-trophies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch trophies SVG
        run: |
          curl -sSf \
            "https://github-profile-trophy.vercel.app/?username=Kuldeep2822k&theme=onedark&no-frame=true&row=1&column=7&margin-w=8" \
            -o github-trophies.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-trophies.svg
          git diff --cached --quiet || git commit -m "chore: update github trophies svg"
          git push
