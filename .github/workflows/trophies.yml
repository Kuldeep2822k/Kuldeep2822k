name: Trophies

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    branches: ["master", "main"]
    paths-ignore:
      - github-trophies.svg

concurrency:
  group: profile-artifacts
  cancel-in-progress: false

jobs:
  update-trophies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate trophies SVG
        uses: ryo-ma/github-profile-trophy@v1.0
        with:
          username: Kuldeep2822k
          output_path: github-trophies.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          theme: onedark

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-trophies.svg
          git diff --cached --quiet || git commit -m "chore: update github trophies svg"
          git push
